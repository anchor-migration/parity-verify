# Duke's Bank multi-entity CMP→JPA — CustomerBean scalars
id: dukesbank-cmp-jpa-multi-customer
description: "CustomerBean after CmpScalarEntityToJpa (multi-entity E2E)"
checks:
  - id: jpa_fields_added
    kind: structural
    rule: added_fields_count
    scope_prefix: com.sun.ebank.ejb.customer.CustomerBean
    count: 10
  - id: touchpoint_entity
    kind: behavioral
    rule: source_contains
    patterns:
      - "@javax.persistence.Entity"
      - '@javax.persistence.Table(name = "CUSTOMER")'
  - id: crosswalk_clean
    kind: crosswalk
    rule: zero_crosswalk_errors
